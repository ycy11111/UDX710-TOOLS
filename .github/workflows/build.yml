name: Build UDX710 Tools

on:
  push:
  workflow_dispatch:

jobs:
  build-arm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          curl -fsSL https://deb.nodesource.com/setup_lts.x | sudo -E bash -
          sudo apt-get update
          sudo apt-get install -y nodejs gcc-aarch64-linux-gnu

      - name: build web
        run: |
          cd web
          npm install && npm run build

      - name: build server
        run: |
          cd src
          make

      - name: dopack
        run: |
          mkdir -p output/6677
          echo "#!/bin/sh" > start.sh
          echo "cd /home/root/6677" >> start.sh
          echo "chmod 755 *" >> start.sh
          echo "./server &" >> start.sh
          mv start.sh output/6677/
          cp -r web/dist output/6677/
          cp src/build/ofono-server output/6677/server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: udx710-tools
          path: output